<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1522;
        color: #e8edf5;
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .logo { color: #10b981; }
      p { font-size: 12px; color: #94a3b8; margin: 0 0 12px; line-height: 1.5; }
      label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 5px; }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #0a0e17;
        border: 1px solid #26304a;
        border-radius: 8px;
        color: #e8edf5;
        padding: 8px 10px;
        font-size: 12px;
        outline: none;
      }
      input:focus { border-color: #10b981; }
      button {
        margin-top: 10px;
        width: 100%;
        background: #10b981;
        color: #04110c;
        border: none;
        border-radius: 8px;
        padding: 9px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      .saved { font-size: 11px; color: #10b981; margin-top: 8px; height: 14px; }
      .hint { font-size: 11px; color: #64748b; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1><span class="logo">◈</span> PromptDeck</h1>
    <p>Prompts appear inside ChatGPT & Claude. Open a chat and look bottom-right.</p>
    <label for="apiUrl">Prompt library API (optional)</label>
    <input id="apiUrl" placeholder="http://localhost:3000/api/prompts" />
    <div class="hint">Leave blank to use the built-in library. Point this at your deployed site to sync new prompts.</div>
    <button id="save">Save</button>
    <div class="saved" id="saved"></div>
    <script src="popup.js"></script>
  </body>
</html>
